services:

  api:
    build: .
    container_name: fastapi_app

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - postgres

    env_file:
      - .env

  postgres:
    image: postgres:17

    container_name: postgres_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: google_drive_project

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: